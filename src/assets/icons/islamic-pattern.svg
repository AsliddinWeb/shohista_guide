<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="islamic" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <!-- Islamic geometric 8-pointed star pattern -->
      <polygon points="25,2 29,18 44,10 36,24 50,25 36,26 44,40 29,32 25,48 21,32 6,40 14,26 0,25 14,24 6,10 21,18" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <rect x="17" y="17" width="16" height="16" fill="none" stroke="currentColor" stroke-width="0.3" opacity="0.2" transform="rotate(45 25 25)"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#islamic)"/>
</svg>
