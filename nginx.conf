# asimir-tour.uz — certbot o'zi SSL qo'shadi
server {
    listen 80;
    server_name asimir-tour.uz www.asimir-tour.uz;

    root /home/projects/shohista_guide/dist;
    index index.html;

    # Gzip siqish
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Static fayllar — uzoq cache (hash bilan nomlangan)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # OG image — qisqa cache (yangilanishi mumkin)
    location = /og-image.jpg {
        expires 7d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }

    # robots.txt va sitemap — crawler uchun
    location = /robots.txt  { access_log off; log_not_found off; }
    location = /sitemap.xml {
        access_log off;
        log_not_found off;
        add_header Content-Type "application/xml";
    }

    # SPA — barcha routelarni index.html ga
    location / {
        try_files $uri $uri/ /index.html;
    }
}
